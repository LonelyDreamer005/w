<!DOCTYPE html>
<html>
<head>
    <title>Student Feedback Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.4);
        }

        .rating-group {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-top: 10px;
        }

        .rating-group input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .rating-group label {
            margin: 0;
            font-weight: normal;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .success {
            color: #388e3c;
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>

<body>

<div class="form-container">
    <h2>Student Feedback Form</h2>
    
    <div class="success" id="successMsg">
        ✓ Form submitted successfully!
    </div>

    <form id="feedbackForm" method="POST" action="http://localhost:8080/YourProjectName/FeedbackServlet" onsubmit="return validateForm()">
        
        <!-- NAME FIELD -->
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name">
            <div class="error" id="nameError">Name is required</div>
        </div>

        <!-- EMAIL FIELD -->
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email address">
            <div class="error" id="emailError">Please enter a valid email address</div>
        </div>

        <!-- COURSE DROPDOWN -->
        <div class="form-group">
            <label for="course">Course:</label>
            <select id="course" name="course">
                <option value="">-- Select a Course --</option>
                <option value="Web Technology">Web Technology</option>
                <option value="Database Management">Database Management</option>
                <option value="Data Structures">Data Structures</option>
                <option value="Software Engineering">Software Engineering</option>
                <option value="Mobile Development">Mobile Development</option>
            </select>
            <div class="error" id="courseError">Please select a course</div>
        </div>

        <!-- RATING (Radio Buttons) -->
        <div class="form-group">
            <label>Rating (1-5):</label>
            <div class="rating-group">
                <label>
                    <input type="radio" name="rating" value="1"> 1 (Poor)
                </label>
                <label>
                    <input type="radio" name="rating" value="2"> 2 (Fair)
                </label>
                <label>
                    <input type="radio" name="rating" value="3"> 3 (Good)
                </label>
                <label>
                    <input type="radio" name="rating" value="4"> 4 (Very Good)
                </label>
                <label>
                    <input type="radio" name="rating" value="5"> 5 (Excellent)
                </label>
            </div>
            <div class="error" id="ratingError">Please select a rating</div>
        </div>

        <!-- SUBMIT BUTTON -->
        <button type="submit">Submit Feedback</button>
    </form>
</div>

<script>
    // ========== VALIDATION FUNCTION ==========
    function validateForm() {
        // ========== STEP 1: Get form values ==========
        let name = document.getElementById("name").value.trim();
        let email = document.getElementById("email").value.trim();
        let course = document.getElementById("course").value.trim();
        let rating = document.querySelector('input[name="rating"]:checked');
        
        // ========== STEP 2: Reset all error messages ==========
        document.getElementById("nameError").style.display = "none";
        document.getElementById("emailError").style.display = "none";
        document.getElementById("courseError").style.display = "none";
        document.getElementById("ratingError").style.display = "none";
        
        let isValid = true;
        
        // ========== STEP 3: Validate Name ==========
        if (name === "") {
            document.getElementById("nameError").style.display = "block";
            isValid = false;
        }
        
        // ========== STEP 4: Validate Email (⭐ EMAIL REGEX PATTERN) ==========
        // Email format: something@something.something
        let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        // ↓ Breakdown:
        // ^ = start of string
        // [^\s@]+ = one or more characters that are NOT whitespace or @
        // @ = literal @ symbol
        // [^\s@]+ = domain name (one or more chars, no space/no @)
        // \. = literal dot (escaped because . matches any char in regex)
        // [^\s@]+ = top-level domain (.com, .org, etc.)
        // $ = end of string
        
        if (email === "" || !emailRegex.test(email)) {
            document.getElementById("emailError").style.display = "block";
            isValid = false;
        }
        
        // ========== STEP 5: Validate Course ==========
        if (course === "") {
            document.getElementById("courseError").style.display = "block";
            isValid = false;
        }
        
        // ========== STEP 6: Validate Rating ==========
        if (rating === null) {
            document.getElementById("ratingError").style.display = "block";
            isValid = false;
        }
        
        // ========== STEP 7: Return validation result ==========
        // If all fields valid: return true (form submits)
        // If any field invalid: return false (form doesn't submit)
        return isValid;
        
        // NOTE: When onsubmit="return validateForm()" executes:
        // - If returns true: form POSTs to action="/path/to/servlet"
        // - If returns false: form does NOT submit (stays on page)
    }
</script>

</body>
</html>
