<!DOCTYPE html>
<html>
<head>
    <title>Simple Blog</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        header {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }

        nav {
            background: #555;
            color: white;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        .container {
            display: flex;
        }

        article {
            flex: 3;
            padding: 10px;
        }

        aside {
            flex: 1;
            background: #f0f0f0;
            padding: 10px;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }

        /* Dark Mode */
        .dark {
            background: black;
            color: white;
        }

        .dark nav {
            background: black;
        }

        .dark aside {
            background: #222;
        }

        button {
            margin-top: 10px;
            padding: 5px 10px;
        }
    </style>
</head>

<body id="body">

<header>
    <h1>My Blog</h1>
    <button onclick="toggleMode()">Toggle Dark Mode</button>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <article>
        <h2>Blog Title</h2>
        <p>This is a simple blog post.</p>
    </article>

    <aside>
        <h3>Sidebar</h3>
        <p>Links or info here</p>
    </aside>
</div>

<footer>
    <p>Footer Section</p>
</footer>

<script>
function toggleMode() {
    let body = document.getElementById("body");
    body.classList.toggle("dark");
}
</script>

</body>
</html>
